name: Daily update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-transcribe:
    runs-on: [self-hosted, Windows, X64, local-transcripts]

    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest videos
        run: python scripts/fetch_videos.py

      - name: Fetch transcripts
        run: python -u scripts/get_transcripts.py

      - name: Upload transcript data
        uses: actions/upload-artifact@v4
        with:
          name: transcript-data
          path: |
            data/videos_raw.json
            data/videos_with_transcripts.json
            data/channels.csv

  enrich-build-deploy:
    runs-on: ubuntu-latest
    needs: fetch-and-transcribe

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download transcript data
        uses: actions/download-artifact@v4
        with:
          name: transcript-data
          path: data_downloaded

      - name: Restore data files
        run: |
          mkdir -p data
          cp data_downloaded/videos_raw.json data/videos_raw.json
          cp data_downloaded/videos_with_transcripts.json data/videos_with_transcripts.json
          cp data_downloaded/channels.csv data/channels.csv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enrich with LLM
        run: python -u scripts/enrich_with_llm_batch.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/*.csv output/index.html
          git diff --cached --quiet || git commit -m "Daily content update"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4