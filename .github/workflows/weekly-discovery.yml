name: Weekly discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1"

permissions:
  contents: write

jobs:
  discover-and-promote:
    runs-on: ubuntu-latest

    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover candidate channels
        run: python scripts/discover_channels.py

      - name: Promote strong candidates
        run: python scripts/promote_channels.py

      - name: Commit updated channel files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/channel_candidates.csv data/channels.csv
          git diff --cached --quiet || git commit -m "Weekly channel discovery update"
          git push